<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>教授学的ボムバーマン - 聖剣の審判</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'MS Mincho', serif;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
        }

        /* ===== STATUS BAR ===== */
        #ui-layer {
            width: 100%;
            max-width: 430px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 16px;
            background: linear-gradient(90deg, #0d0d1a, #1a0a0a, #0d0d1a);
            border-bottom: 2px solid #8a0303;
            flex-shrink: 0;
        }
        .status-item {
            font-size: 0.85em;
            color: #ffd700;
            text-shadow: 0 0 8px #ffd700aa;
        }
        #pause-btn {
            background: #333;
            border: 1px solid #666;
            color: #ccc;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75em;
            cursor: pointer;
            font-family: 'MS Mincho', serif;
        }

        /* ===== GAME SCREEN WRAPPER (Game Boy screen look) ===== */
        #screen-wrapper {
            width: 100%;
            max-width: 430px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background: #16213e;
            position: relative;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            position: relative;
            background: #000;
            border-bottom: 2px solid #222;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: pixelated;
        }

        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(80,0,0,0.88);
            color: white;
            font-size: clamp(1.2em, 5vw, 2em);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            gap: 12px;
        }

        #reset-btn {
            padding: 10px 24px;
            font-size: 0.5em;
            font-family: 'MS Mincho', serif;
            background: #ffd700;
            border: none;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            letter-spacing: 0.05em;
        }

        /* ===== MESSAGE BOX ===== */
        #message-box {
            width: 100%;
            max-width: 430px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 10px;
            background: #0d0d1a;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
            font-size: clamp(0.6em, 2.5vw, 0.78em);
            text-align: center;
            color: #ff4d4d;
            font-weight: bold;
            line-height: 1.3;
            flex-shrink: 0;
        }

        /* ===== GAME BOY CONTROLLER ===== */
        #controller {
            width: 100%;
            max-width: 430px;
            background: linear-gradient(180deg, #2a2a4a 0%, #1a1a35 100%);
            border-top: 3px solid #0a0a1a;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px 16px;
            gap: 10px;
        }

        /* D-pad */
        #dpad {
            position: relative;
            width: 120px;
            height: 120px;
            flex-shrink: 0;
        }

        .dpad-btn {
            position: absolute;
            background: linear-gradient(145deg, #3a3a5a, #252540);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 18px;
            border-radius: 4px;
            box-shadow: 0 4px 0 #0a0a1a, inset 0 1px 0 rgba(255,255,255,0.1);
            transition: transform 0.05s, box-shadow 0.05s;
            -webkit-touch-callout: none;
        }
        .dpad-btn:active, .dpad-btn.pressed {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0a0a1a, inset 0 1px 0 rgba(255,255,255,0.05);
            background: linear-gradient(145deg, #252540, #3a3a5a);
            color: #fff;
        }

        #btn-up    { top: 0;   left: 40px; width: 40px; height: 40px; border-radius: 4px 4px 0 0; }
        #btn-down  { bottom: 0; left: 40px; width: 40px; height: 40px; border-radius: 0 0 4px 4px; }
        #btn-left  { top: 40px; left: 0;   width: 40px; height: 40px; border-radius: 4px 0 0 4px; }
        #btn-right { top: 40px; right: 0;  width: 40px; height: 40px; border-radius: 0 4px 4px 0; }
        #btn-center {
            position: absolute;
            top: 40px; left: 40px;
            width: 40px; height: 40px;
            background: #1e1e38;
            border-radius: 0;
            pointer-events: none;
        }

        /* Action buttons area */
        #action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        #btn-bomb {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #cc2222, #7a0000);
            border: 3px solid #aa0000;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 5px 0 #3a0000, 0 0 20px rgba(200,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s, box-shadow 0.05s;
            -webkit-touch-callout: none;
        }
        #btn-bomb:active, #btn-bomb.pressed {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #3a0000, 0 0 12px rgba(200,0,0,0.4);
        }
        .bomb-label {
            font-size: 0.65em;
            color: #999;
            letter-spacing: 0.05em;
            text-align: center;
        }

        /* Center mini buttons */
        #center-btns {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .mini-btn {
            background: linear-gradient(145deg, #3a3a5a, #252540);
            border: none;
            border-radius: 12px;
            color: #aaa;
            padding: 5px 14px;
            font-size: 0.65em;
            font-family: 'MS Mincho', serif;
            cursor: pointer;
            box-shadow: 0 3px 0 #0a0a1a;
            transition: transform 0.05s, box-shadow 0.05s;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        .mini-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0a1a;
        }

        /* Game Boy decorative speaker dots */
        #speaker {
            display: flex;
            flex-direction: column;
            gap: 4px;
            opacity: 0.3;
            margin-left: -5px;
        }
        .speaker-row {
            display: flex;
            gap: 4px;
        }
        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #667;
        }

        /* ===== モード切替トグル ===== */
        #mode-toggle {
            display: flex;
            background: #0a0a1a;
            border-radius: 20px;
            padding: 3px;
            border: 1px solid #333;
            margin-bottom: 4px;
        }
        .mode-btn {
            background: transparent;
            border: none;
            color: #666;
            font-size: 0.62em;
            font-family: 'MS Mincho', serif;
            padding: 4px 9px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .mode-btn.active {
            background: #3a3a6a;
            color: #fff;
        }

        /* ===== スライドパッド ===== */
        #slidepad-wrap {
            display: none;
            position: relative;
            width: 168px;
            height: 168px;
            flex-shrink: 0;
            align-items: center;
            justify-content: center;
        }
        #slidepad-base {
            width: 152px;
            height: 152px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #2e2e50, #14142a);
            border: 3px solid #3a3a5a;
            box-shadow: 0 5px 0 #0a0a1a, inset 0 2px 6px rgba(0,0,0,0.6);
            position: relative;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        /* 十字線 */
        #slidepad-base::before {
            content: '';
            position: absolute;
            top: 12px; bottom: 12px;
            left: 50%; width: 1px;
            background: rgba(255,255,255,0.07);
            transform: translateX(-50%);
        }
        #slidepad-base::after {
            content: '';
            position: absolute;
            left: 12px; right: 12px;
            top: 50%; height: 1px;
            background: rgba(255,255,255,0.07);
            transform: translateY(-50%);
        }
        #slidepad-stick {
            position: absolute;
            top: 50%; left: 50%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 32%, #6a6aaa, #2a2a50);
            border: 2px solid #5a5a8a;
            box-shadow: 0 4px 0 #0a0a1a, inset 0 1px 3px rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            pointer-events: none;
            will-change: transform;
        }
    </style>
</head>
<body>

    <!-- STATUS -->
    <div id="ui-layer">
        <span class="status-item">第 <span id="level-val">1</span> 学期</span>
        <button id="pause-btn" onclick="togglePause()">⏸ ポーズ</button>
        <span class="status-item" id="bomb-status">💣 <span id="bomb-count">2</span></span>
    </div>

    <!-- GAME SCREEN -->
    <div id="screen-wrapper">
        <div id="game-container">
            <canvas id="game-canvas" width="384" height="384"></canvas>
            <div id="overlay">
                <span id="finish-msg">留年</span>
                <button id="reset-btn" onclick="resetGame()">再履修</button>
            </div>
        </div>
    </div>

    <!-- MESSAGE -->
    <div id="message-box">直道「さあ、今日のゼミを始めようかぁ」</div>

    <!-- CONTROLLER -->
    <div id="controller">

        <!-- D-PAD -->
        <div id="dpad">
            <button class="dpad-btn" id="btn-up">▲</button>
            <button class="dpad-btn" id="btn-left">◀</button>
            <div class="dpad-btn" id="btn-center"></div>
            <button class="dpad-btn" id="btn-right">▶</button>
            <button class="dpad-btn" id="btn-down">▼</button>
        </div>

        <!-- SLIDE PAD -->
        <div id="slidepad-wrap">
            <div id="slidepad-base">
                <div id="slidepad-stick"></div>
            </div>
        </div>

        <!-- CENTER MINI BUTTONS -->
        <div id="center-btns">
            <div id="mode-toggle">
                <button class="mode-btn active" id="mode-dpad" onclick="setMode('dpad')">十字</button>
                <button class="mode-btn" id="mode-slide" onclick="setMode('slide')">スライド</button>
            </div>
            <button class="mini-btn" onclick="togglePause()">PAUSE</button>
            <button class="mini-btn" onclick="tryReset()">RESET</button>
            <div id="speaker">
                <div class="speaker-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="speaker-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="speaker-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                <div class="speaker-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>

        <!-- BOMB BUTTON -->
        <div id="action-area">
            <button id="btn-bomb">💣</button>
            <div class="bomb-label">爆弾設置</div>
        </div>

    </div>

// ===== TOUCH CONTROLS =====

// --- モード切替 ---
function setMode(mode) {
    const dpad = document.getElementById('dpad');
    const slideWrap = document.getElementById('slidepad-wrap');
    const btnDpad = document.getElementById('mode-dpad');
    const btnSlide = document.getElementById('mode-slide');

    if (mode === 'dpad') {
        dpad.style.display = 'block';
        slideWrap.style.display = 'none';
        btnDpad.classList.add('active');
        btnSlide.classList.remove('active');
    } else {
        dpad.style.display = 'none';
        slideWrap.style.display = 'flex';
        btnDpad.classList.remove('active');
        btnSlide.classList.add('active');
    }
    // 方向キーをリセット
    ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k => keys[k] = false);
    document.getElementById('slidepad-stick').style.transform = 'translate(-50%, -50%)';
}

// --- スライドパッド ---
(function() {
    const base = document.getElementById('slidepad-base');
    const stick = document.getElementById('slidepad-stick');
    const DEAD = 10;   // デッドゾーン（px）
    const MAX  = 52;   // スティック最大移動距離（px）

    function update(clientX, clientY) {
        const rect = base.getBoundingClientRect();
        const cx = rect.left + rect.width  / 2;
        const cy = rect.top  + rect.height / 2;
        const dx = clientX - cx;
        const dy = clientY - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const clamp = Math.min(dist, MAX);

        // スティックを動かす
        stick.style.transform =
            `translate(calc(-50% + ${clamp * Math.cos(angle)}px), calc(-50% + ${clamp * Math.sin(angle)}px))`;

        // 4方向キーに変換
        keys['ArrowLeft']  = dx < -DEAD;
        keys['ArrowRight'] = dx >  DEAD;
        keys['ArrowUp']    = dy < -DEAD;
        keys['ArrowDown']  = dy >  DEAD;
    }

    function reset() {
        stick.style.transform = 'translate(-50%, -50%)';
        ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].forEach(k => keys[k] = false);
    }

    // タッチ
    base.addEventListener('touchstart', e => { e.preventDefault(); update(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    base.addEventListener('touchmove',  e => { e.preventDefault(); update(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    base.addEventListener('touchend',   e => { e.preventDefault(); reset(); }, { passive: false });
    base.addEventListener('touchcancel',e => { e.preventDefault(); reset(); }, { passive: false });

    // マウス（PC確認用）
    let mouseDown = false;
    base.addEventListener('mousedown', e => { mouseDown = true; update(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => { if (mouseDown) update(e.clientX, e.clientY); });
    document.addEventListener('mouseup', () => { if (mouseDown) { mouseDown = false; reset(); } });
})();

// ===== TOUCH CONTROLS =====
function setupTouchBtn(id, keyCode) {
    const el = document.getElementById(id);
    if (!el) return;

    const press = (e) => {
        e.preventDefault();
        keys[keyCode] = true;
        el.classList.add('pressed');
    };
    const release = (e) => {
        e.preventDefault();
        keys[keyCode] = false;
        el.classList.remove('pressed');
    };

    el.addEventListener('touchstart', press, { passive: false });
    el.addEventListener('touchend', release, { passive: false });
    el.addEventListener('touchcancel', release, { passive: false });
    // mouse fallback for desktop testing
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', release);
    el.addEventListener('mouseleave', release);
}

setupTouchBtn('btn-up', 'ArrowUp');
setupTouchBtn('btn-down', 'ArrowDown');
setupTouchBtn('btn-left', 'ArrowLeft');
setupTouchBtn('btn-right', 'ArrowRight');

// Bomb button
const bombBtn = document.getElementById('btn-bomb');
const fireBomb = (e) => {
    e.preventDefault();
    keys['Space'] = true;
    bombBtn.classList.add('pressed');
    setTimeout(() => {
        keys['Space'] = false;
        bombBtn.classList.remove('pressed');
    }, 150);
};
bombBtn.addEventListener('touchstart', fireBomb, { passive: false });
bombBtn.addEventListener('mousedown', fireBomb);

// ===== KEYBOARD CONTROLS =====
document.addEventListener('keydown', e => {
    if (e.code === 'Enter' && (gameOver || isPaused)) {
        isPaused = false; resetGame(); e.preventDefault(); return;
    }
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        togglePause(); e.preventDefault(); return;
    }
    if (isPaused || gameOver) return;
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ===== GAME FUNCTIONS =====
function initMap() {
    map = [];
    for (let r = 0; r < ROWS; r++) {
        map[r] = [];
        for (let c = 0; c < COLS; c++) {
            if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1 || (r%2===0 && c%2===0)) {
                map[r][c] = 1;
            } else if (r <= 2 && c <= 2) {
                map[r][c] = 0;
            } else {
                map[r][c] = (Math.random() < 0.25 ? 2 : 0);
            }
        }
    }
    map[9][9] = 0;
}

function togglePause() {
    if (gameOver) return;
    isPaused = !isPaused;
    if (isPaused) {
        updateMessage("直道「あはっ。中断だねぇ。RESETボタンで再履修もできるよぉ」", "#ffd700");
    } else {
        updateMessage(SERIFU[level] || `直道「さあ、再開しようかぁ」`);
    }
}

function tryReset() {
    if (gameOver || isPaused) { isPaused = false; resetGame(); }
}

function resetGame() {
    level = 1; lvlEl.textContent = level; gameOver = false; overlay.style.display = 'none';
    bombs = []; explosions = []; liquids = []; isPaused = false;
    player.x = 48; player.y = 48; enemy.x = 304; enemy.y = 304; enemy.alive = true;
    bombStatus.style.display = "inline"; initMap();
    updateMessage(SERIFU[1]);
    if (!gameRunning) { gameRunning = true; gameLoop(); }
}

function updateMessage(m, c="#ff4d4d") {
    if (m) { msgBox.innerHTML = m; msgBox.style.color = c; }
}

function triggerGameOver(m, isWin=false) {
    if (gameOver) return; gameOver = true;
    overlay.style.display = 'flex';
    finishMsg.innerHTML = isWin ? "修了" : "留年";
    updateMessage(m, isWin ? "#ffd700" : "#fff");
}

function isBlocked(x, y, r, entity, isEnemy=false) {
    const margin = 8;
    const pts = [
        {x:x-r+margin, y:y-r+margin}, {x:x+r-margin, y:y-r+margin},
        {x:x-r+margin, y:y+r-margin}, {x:x+r-margin, y:y+r-margin}
    ];
    return pts.some(p => {
        let c = Math.floor(p.x/TILE_SIZE), r_idx = Math.floor(p.y/TILE_SIZE);
        if (!map[r_idx] || map[r_idx][c] !== 0) return true;
        return bombs.some(b => b.c===c && b.r===r_idx && (isEnemy ? !b.isEnemy : (c!==Math.floor(entity.x/TILE_SIZE) || r_idx!==Math.floor(entity.y/TILE_SIZE))));
    });
}

function update() {
    if (gameOver || isPaused) return;

    let pnx = player.x, pny = player.y;
    if (keys['ArrowUp'])    { pny -= PLAYER_SPEED; player.swordDir = 'Up'; }
    if (keys['ArrowDown'])  { pny += PLAYER_SPEED; player.swordDir = 'Down'; }
    if (keys['ArrowLeft'])  { pnx -= PLAYER_SPEED; player.swordDir = 'Left'; }
    if (keys['ArrowRight']) { pnx += PLAYER_SPEED; player.swordDir = 'Right'; }
    if (!isBlocked(pnx, pny, player.r, player, false)) { player.x = pnx; player.y = pny; }

    if (level < 20) {
        if (player.cooldown > 0) player.cooldown--;
        if (keys['Space'] && player.cooldown===0 && bombs.filter(b=>!b.isEnemy).length < PLAYER_MAX_BOMBS) {
            let pc = Math.floor(player.x/TILE_SIZE), pr = Math.floor(player.y/TILE_SIZE);
            if (!bombs.some(b => b.c===pc && b.r===pr && !b.isEnemy)) {
                bombs.push({ c:pc, r:pr, timer:100, isEnemy:false, range:2, isUnchi:false });
                player.cooldown = 25;
                bombEl.textContent = PLAYER_MAX_BOMBS - bombs.filter(b=>!b.isEnemy).length;
            }
        }
    } else {
        bombStatus.style.display = "none";
        if (keys['Space'] && player.swordTimer <= 0) { player.swordTimer = 15; }
        if (player.swordTimer > 0) {
            player.swordTimer--;
            let sx = player.x, sy = player.y;
            if (player.swordDir==='Up') sy-=30; else if(player.swordDir==='Down') sy+=30;
            else if(player.swordDir==='Left') sx-=30; else if(player.swordDir==='Right') sx+=30;
            let sc=Math.floor(sx/TILE_SIZE), sr=Math.floor(sy/TILE_SIZE);
            if (map[sr] && map[sr][sc]===2) map[sr][sc]=0;
            if (Math.sqrt((sx-enemy.x)**2+(sy-enemy.y)**2) < 25) triggerGameOver("直道「あはっ……見事なエクスカリバーだ……」", true);
        }
    }

    if (enemy.alive) {
        if (enemy.invincibleTimer > 0) enemy.invincibleTimer--;
        let dx=player.x-enemy.x, dy=player.y-enemy.y;
        let stepX=(dx>0?1:-1)*ENEMY_SPEED, stepY=(dy>0?1:-1)*ENEMY_SPEED;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (!isBlocked(enemy.x+stepX, enemy.y, enemy.r, enemy, true)) enemy.x+=stepX;
            else if (!isBlocked(enemy.x, enemy.y+stepY, enemy.r, enemy, true)) enemy.y+=stepY;
        } else {
            if (!isBlocked(enemy.x, enemy.y+stepY, enemy.r, enemy, true)) enemy.y+=stepY;
            else if (!isBlocked(enemy.x+stepX, enemy.y, enemy.r, enemy, true)) enemy.x+=stepX;
        }

        if (level < 20) {
            let limit = (level===9) ? 1 : Math.min(4, level);
            let unchi = 0;
            if (level>=5 && level<=8) unchi=level-4;
            else if (level>=10 && level<20) unchi=4;
            else if (level===9) unchi=0;
            const curEBombs = bombs.filter(b=>b.isEnemy);
            if (curEBombs.length < limit) {
                let ec=Math.floor(enemy.x/TILE_SIZE), er=Math.floor(enemy.y/TILE_SIZE);
                if (!bombs.some(b=>b.c===ec && b.r===er && b.isEnemy)) {
                    const isU = curEBombs.length < unchi;
                    bombs.push({ c:ec, r:er, timer:110, isEnemy:true, range:2, isUnchi:isU });
                    if (isU && level>=10) {
                        let prob=0.3+(level>=11?(level-10)*0.1:0);
                        if (Math.random()<prob) spawnEruption(ec,er);
                        let hokuhokuProb=0;
                        if (level>=16) hokuhokuProb=0.2+(Math.min(level,19)-16)*0.067;
                        if (Math.random()<hokuhokuProb) { enemy.invincibleTimer=60; updateMessage("直道「あはっ、ホクホクだよぉ！」"); }
                    }
                }
            }
        }
        if (level<20 && Math.sqrt((player.x-enemy.x)**2+(player.y-enemy.y)**2)<18) triggerGameOver("直道「あはっ、捕まえたよぉ」");
    }

    liquids.forEach((l,i)=>{
        l.x+=l.vx; l.y+=l.vy; l.timer--;
        if (level<20 && Math.sqrt((player.x-l.x)**2+(player.y-l.y)**2)<14) triggerGameOver("直道「私の噴火からは逃げられないよぉ」");
        if (l.timer<=0) liquids.splice(i,1);
    });

    bombs.forEach((b,i)=>{
        b.timer--;
        if (b.timer<=0) { explode(b); bombs.splice(i,1); if(!b.isEnemy) bombEl.textContent=PLAYER_MAX_BOMBS-bombs.filter(b=>!b.isEnemy).length; }
    });

    explosions.forEach((ex,i)=>{
        ex.timer--;
        if (ex.timer<=0) explosions.splice(i,1);
        if (level<20 && Math.floor(player.x/TILE_SIZE)===ex.c && Math.floor(player.y/TILE_SIZE)===ex.r) triggerGameOver("直道「爆発しちゃったねぇ」");
        if (enemy.alive && !ex.fromEnemy && Math.floor(enemy.x/TILE_SIZE)===ex.c && Math.floor(enemy.y/TILE_SIZE)===ex.r) {
            if (enemy.invincibleTimer<=0) {
                enemy.alive=false; level++; lvlEl.textContent=level;
                updateMessage(SERIFU[level]||`直道「あはっ、第 ${level} 学期だねぇ」`);
                setTimeout(nextSession, 1500);
            }
        }
    });
}

function spawnEruption(c, r) {
    const sX=c*TILE_SIZE+16, sY=r*TILE_SIZE+16;
    const numLiquids=Math.floor(Math.random()*7)+3;
    for (let i=0; i<numLiquids; i++) {
        let vx, vy;
        if (level>=15) {
            let angle=Math.atan2(player.y-sY, player.x-sX)+(Math.random()-0.5);
            vx=Math.cos(angle)*3; vy=Math.sin(angle)*3;
        } else {
            let a=Math.random()*Math.PI*2; vx=Math.cos(a)*2.5; vy=Math.sin(a)*2.5;
        }
        liquids.push({x:sX,y:sY,vx,vy,timer:32});
    }
}

function explode(b) {
    const dirs=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];
    dirs.forEach(d=>{
        for (let i=0; i<=b.range; i++) {
            if (d[0]===0 && d[1]===0 && i>0) continue;
            let nc=b.c+d[0]*i, nr=b.r+d[1]*i;
            if (nr>=0 && nr<ROWS && nc>=0 && nc<COLS) {
                if (map[nr][nc]===1) break;
                explosions.push({c:nc,r:nr,timer:15,fromEnemy:b.isEnemy});
                if (map[nr][nc]===2) { map[nr][nc]=0; if(!b.isUnchi) break; }
            }
        }
    });
}

function nextSession() {
    bombs=[]; explosions=[]; liquids=[];
    player.x=48; player.y=48; enemy.x=304; enemy.y=304; enemy.alive=true;
    initMap();
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let r=0; r<ROWS; r++) {
        for (let c=0; c<COLS; c++) {
            if (map[r][c]===1) ctx.fillStyle='#444';
            else if (map[r][c]===2) ctx.fillStyle='#8a0303';
            else ctx.fillStyle='#111';
            ctx.fillRect(c*TILE_SIZE, r*TILE_SIZE, TILE_SIZE, TILE_SIZE);
        }
    }
    bombs.forEach(b=>{
        if (b.isUnchi) { ctx.font='24px serif'; ctx.fillText("💩",b.c*TILE_SIZE+4,b.r*TILE_SIZE+26); }
        else { ctx.fillStyle=b.isEnemy?'#ff00ff':'#fff'; ctx.beginPath(); ctx.arc(b.c*TILE_SIZE+16,b.r*TILE_SIZE+16,14,0,7); ctx.fill(); }
    });
    explosions.forEach(ex=>{ ctx.fillStyle=ex.fromEnemy?'rgba(255,0,255,0.6)':'rgba(255,165,0,0.6)'; ctx.fillRect(ex.c*TILE_SIZE,ex.r*TILE_SIZE,TILE_SIZE,TILE_SIZE); });
    liquids.forEach(l=>{ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(l.x,l.y,6,0,7); ctx.fill(); });

    if (level >= 20) {
        ctx.shadowBlur=15; ctx.shadowColor="cyan"; ctx.font='26px serif'; ctx.fillText("⚔️",player.x-13,player.y+10); ctx.shadowBlur=0;
        if (player.swordTimer>0) {
            ctx.strokeStyle="rgba(0,255,255,0.8)"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(player.x,player.y);
            let tx=player.x,ty=player.y;
            if(player.swordDir==='Up')ty-=40; else if(player.swordDir==='Down')ty+=40; else if(player.swordDir==='Left')tx-=40; else if(player.swordDir==='Right')tx+=40;
            ctx.lineTo(tx,ty); ctx.stroke();
        }
    } else { ctx.font='22px serif'; ctx.fillText("🎓",player.x-11,player.y+9); }

    if (enemy.alive) {
        if (enemy.invincibleTimer>0) { ctx.shadowBlur=15; ctx.shadowColor="orange"; }
        if (enemyImg.complete && enemyImg.naturalWidth!==0) ctx.drawImage(enemyImg,enemy.x-16,enemy.y-16,32,32);
        else { ctx.fillStyle='red'; ctx.font='bold 20px serif'; ctx.fillText("直",enemy.x-10,enemy.y+8); }
        ctx.shadowBlur=0;
    }

    if (isPaused) {
        ctx.fillStyle="rgba(0,0,0,0.55)";
        ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle="#ffd700";
        ctx.font="bold 34px serif";
        ctx.textAlign="center";
        ctx.shadowBlur=10; ctx.shadowColor="#ffd700";
        ctx.fillText("PAUSE", canvas.width/2, canvas.height/2);
        ctx.shadowBlur=0; ctx.textAlign="start";
    }
}

function gameLoop() {
    if (!gameRunning) return;
    if (!isPaused) update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ===== RESPONSIVE CANVAS SIZING =====
function resizeCanvas() {
    const wrapper = document.getElementById('screen-wrapper');
    const controller = document.getElementById('controller');
    const uiLayer = document.getElementById('ui-layer');
    const msgBox = document.getElementById('message-box');

    const totalH = window.innerHeight;
    const uiH = uiLayer.offsetHeight;
    const msgH = msgBox.offsetHeight;
    const ctrlH = controller.offsetHeight;

    const availableH = totalH - uiH - msgH - ctrlH;
    const availableW = Math.min(window.innerWidth, 430);
    const size = Math.min(availableH, availableW);

    const gameContainer = document.getElementById('game-container');
    gameContainer.style.width = size + 'px';
    gameContainer.style.height = size + 'px';
    canvas.style.width = size + 'px';
    canvas.style.height = size + 'px';
}

window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));
document.addEventListener('DOMContentLoaded', resizeCanvas);
setTimeout(resizeCanvas, 100);

// Prevent scroll/bounce on iOS
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

initMap(); gameRunning = true; gameLoop();
</script>
